<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2100 900" role="img">
  <rect width="2100" height="900" fill="#0a0a0a"/>
  <g font-family="Inter, Helvetica, Arial, sans-serif">
    <text x="120" y="140" font-size="66" font-weight="200" fill="#fafaf8">从个人试用到组织能力</text>
    <text x="124" y="195" font-size="28" font-weight="300" fill="#d4d4d2">成功部署不是“开放权限”，而是先搭好基础设施。</text>
    <path d="M220 520h1660" stroke="#fafaf8" stroke-width="2"/>
    <g>
      <circle cx="300" cy="520" r="22" fill="#002FA7"/><text x="235" y="430" font-size="32" fill="#fafaf8">DRI</text><text x="205" y="470" font-size="24" fill="#d4d4d2">指定负责人</text>
      <circle cx="700" cy="520" r="22" fill="#002FA7"/><text x="620" y="605" font-size="32" fill="#fafaf8">BASELINE</text><text x="590" y="645" font-size="24" fill="#d4d4d2">CLAUDE.md / 权限 / 测试</text>
      <circle cx="1100" cy="520" r="22" fill="#002FA7"/><text x="1010" y="430" font-size="32" fill="#fafaf8">PLUGIN</text><text x="970" y="470" font-size="24" fill="#d4d4d2">分发可复用设置</text>
      <circle cx="1500" cy="520" r="22" fill="#002FA7"/><text x="1415" y="605" font-size="32" fill="#fafaf8">GOVERN</text><text x="1365" y="645" font-size="24" fill="#d4d4d2">安全、评审、市场</text>
      <circle cx="1850" cy="520" r="22" fill="#002FA7"/><text x="1765" y="430" font-size="32" fill="#fafaf8">SCALE</text><text x="1710" y="470" font-size="24" fill="#d4d4d2">扩大访问范围</text>
    </g>
    <rect x="120" y="760" width="1860" height="70" fill="#002FA7"/>
    <text x="160" y="805" font-size="28" fill="#ffffff">原则：先让第一次体验变得可生产，再追求覆盖率。</text>
  </g>
</svg>
