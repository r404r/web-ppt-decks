<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000"><rect width="1600" height="1000" fill="#f1f3f5"/><g font-family="Noto Sans SC, sans-serif" fill="#0a1f3d"><text x="100" y="140" font-size="62" font-family="Noto Serif SC, serif" font-weight="700">Compaction：从父会话安全分叉</text><path d="M220 310h520v170H220zM220 590h520v170H220zM900 450h520v170H900z" fill="none" stroke="#0a1f3d" stroke-width="5"/><path d="M740 395c90 0 100 140 160 140M740 675c90 0 100-140 160-140" fill="none" stroke="#0a1f3d" stroke-width="5"/><text x="260" y="380" font-size="32">父会话 prefix</text><text x="260" y="445" font-size="26">同 system / tools / history</text><text x="260" y="660" font-size="32">追加 compaction prompt</text><text x="260" y="725" font-size="26">只新增少量 token</text><text x="945" y="535" font-size="32">摘要后的新会话</text><text x="945" y="590" font-size="26">继续继承已缓存前缀</text><text x="220" y="880" font-size="30">关键：fork 操作也要共享父会话开头，而不是另起一套 summarizer prompt。</text></g></svg>
