<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000"><rect width="1600" height="1000" fill="#0a0a0a"/><g font-family="Inter, Arial, sans-serif"><text x="100" y="145" fill="#C5E803" font-size="54" font-weight="800">CLUE 30 天影响</text><text x="100" y="205" fill="#fafaf8" font-size="28">从人工拼图，变成机器先跑完证据链</text><g transform="translate(100 300)"><rect width="360" height="430" fill="#C5E803"/><text x="38" y="120" fill="#0a0a0a" font-size="92" font-weight="800">7%</text><text x="40" y="176" fill="#0a0a0a" font-size="30">误报率</text><text x="40" y="250" fill="#0a0a0a" font-size="24">此前约三分之一告警为误报</text></g><g transform="translate(620 300)"><rect width="360" height="430" fill="#fafaf8"/><text x="38" y="120" fill="#0a0a0a" font-size="82" font-weight="800">27k</text><text x="40" y="176" fill="#0a0a0a" font-size="30">工具调用</text><text x="40" y="250" fill="#0a0a0a" font-size="24">自动化完成上下文收集</text></g><g transform="translate(1140 300)"><rect width="360" height="430" fill="#fafaf8"/><text x="38" y="120" fill="#0a0a0a" font-size="76" font-weight="800">1,870h</text><text x="40" y="176" fill="#0a0a0a" font-size="30">节省工时</text><text x="40" y="250" fill="#0a0a0a" font-size="24">约 234 人天的人工工作量</text></g></g></svg>
